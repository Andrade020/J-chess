<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>J-Chess — Jogo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Hanken+Grotesk:wght@400;500;600&family=Space+Mono:wght@400;700&family=Noto+Serif+JP:wght@600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#2c2620; --panel:#3a332b; --panel2:#473e34;
    --ink:#f3ead9; --muted:#b6a98f; --line:#5a4f41;
    --wood:#e4c891; --wood-l:#efdcb4; --wood-d:#d8b87f;
    --accent:#3f8f6b; --accent2:#c2603f; --warn:#d2553f;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; }
  body{
    background:radial-gradient(120% 120% at 50% 0%, #342d25 0%, #241f1a 100%);
    color:var(--ink); font-family:"Hanken Grotesk",system-ui,sans-serif;
    display:flex; align-items:center; justify-content:center; min-height:100%;
    padding:14px; -webkit-font-smoothing:antialiased;
  }
  #app{ width:min(96vw, 560px); display:flex; flex-direction:column; gap:12px; }

  /* ---- topbar ---- */
  #topbar{ display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .brand{ font-family:"Space Grotesk",sans-serif; font-weight:700; font-size:22px; letter-spacing:-.01em; }
  .brand .jp{ font-family:"Noto Serif JP",serif; font-weight:600; font-size:.7em; color:var(--muted); margin-left:4px; }
  .status{ display:flex; align-items:center; gap:9px; margin-left:2px; }
  .turn-dot{ width:14px; height:14px; border-radius:50%; border:1.5px solid var(--line); }
  .turn-dot.l{ background:#f1e6d0; } .turn-dot.d{ background:#16130f; }
  .status .txt{ font-size:13.5px; color:var(--muted); }
  .status .txt b{ color:var(--ink); font-weight:600; }
  .status .chk{ color:var(--warn); font-weight:700; }
  .controls{ margin-left:auto; display:flex; gap:6px; flex-wrap:wrap; }
  .controls button{
    font-family:"Space Mono",monospace; font-size:11px; letter-spacing:.02em;
    background:var(--panel); color:var(--ink); border:1px solid var(--line);
    border-radius:9px; padding:7px 10px; cursor:pointer; transition:background .15s,border-color .15s;
  }
  .controls button:hover{ background:var(--panel2); border-color:var(--muted); }
  .controls button:active{ transform:translateY(1px); }

  /* ---- hands ---- */
  .hand{ background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:8px 10px;
    display:flex; align-items:center; gap:8px; min-height:54px; }
  .hand .hlabel{ font-family:"Space Mono",monospace; font-size:10px; letter-spacing:.08em; text-transform:uppercase;
    color:var(--muted); display:flex; align-items:center; gap:6px; flex:none; width:78px; }
  .hand .hlabel .d2{ width:11px; height:11px; border-radius:50%; border:1.5px solid var(--line); }
  .hand .hlabel .d2.l{ background:#f1e6d0; } .hand .hlabel .d2.d{ background:#16130f; }
  .hand .chips{ display:flex; gap:6px; flex-wrap:wrap; flex:1; }
  .hand .empty{ font-size:12px; color:var(--muted); opacity:.6; font-style:italic; }
  .handchip{ position:relative; width:40px; height:44px; border-radius:8px; background:var(--panel2);
    border:1px solid var(--line); display:flex; align-items:center; justify-content:center; cursor:default; }
  .hand.active .handchip{ cursor:pointer; }
  .hand.active .handchip:hover{ border-color:var(--muted); }
  .handchip.sel{ border-color:var(--accent); box-shadow:0 0 0 2px var(--accent); }
  .handchip svg{ width:32px; height:36px; display:block; }
  .handchip .cnt{ position:absolute; right:-4px; bottom:-5px; background:var(--ink); color:#241f1a;
    font-family:"Space Mono",monospace; font-size:10px; font-weight:700; border-radius:9px; padding:0 4px; min-width:15px; text-align:center; }

  /* ---- board ---- */
  .boardframe{ position:relative; background:#5a4124; border-radius:12px; padding:8px 8px 20px 20px; box-shadow:0 14px 30px rgba(0,0,0,.4); }
  .ranks{ position:absolute; left:0; top:8px; bottom:20px; width:20px; display:flex; flex-direction:column; }
  .files{ position:absolute; left:20px; right:8px; bottom:0; height:20px; display:flex; }
  .ranks span,.files span{ flex:1; display:flex; align-items:center; justify-content:center; font-family:"Space Mono",monospace; font-size:9.5px; color:#ecd4a3; opacity:.72; letter-spacing:.04em; }
  .board{ position:relative; width:100%; aspect-ratio:1/1; display:grid;
    grid-template-columns:repeat(9,1fr); grid-template-rows:repeat(9,1fr);
    background:var(--wood); border:1.5px solid #3a2a14; border-radius:4px; overflow:hidden; }
  .sq{ position:relative; min-width:0; min-height:0; display:flex; align-items:center; justify-content:center;
    border-right:1px solid rgba(58,42,20,.45); border-bottom:1px solid rgba(58,42,20,.45); cursor:pointer; }
  .sq:nth-child(9n){ border-right:none; }
  .sq:nth-last-child(-n+9){ border-bottom:none; }
  .board.alt .sq.dk{ background:var(--wood-d); }
  .board.alt .sq.lt{ background:var(--wood-l); }
  .sq .pc{ width:100%; height:100%; pointer-events:none; filter:drop-shadow(0 2px 2px rgba(40,25,5,.28)); }
  .sq.sel{ background:rgba(63,143,107,.42) !important; }
  .sq.last{ background:rgba(194,150,70,.35); }
  .sq.check{ background:rgba(210,85,63,.5) !important; }
  .sq.tgt::after{ content:""; position:absolute; width:30%; height:30%; border-radius:50%;
    background:rgba(40,90,60,.55); pointer-events:none; }
  .sq.cap::before{ content:""; position:absolute; inset:9%; border-radius:50%;
    border:3.5px solid rgba(190,70,45,.7); box-sizing:border-box; pointer-events:none; }
  .sq.drop::after{ content:""; position:absolute; width:26%; height:26%; border-radius:3px;
    background:rgba(63,120,150,.6); pointer-events:none; }

  /* piece themes — classic (illustrated) */
  .set-cls.own-light{ fill:url(#fillL); stroke:#2c2820; color:#2c2820; }
  .set-cls.own-dark{ fill:url(#fillD); stroke:#1a1712; color:#f1ead9; }
  .set-cls .cbody{ stroke-width:3.4; stroke-linejoin:round; stroke-linecap:round; paint-order:stroke; }
  .set-cls .det{ fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; opacity:.72; }
  .set-cls .eye{ fill:none; stroke-width:2.6; }
  .set-cls .mark{ fill:currentColor; stroke:none; }
  /* piece themes — minimal (inherited, robust) */
  .set-min.own-light{ fill:#f4efe6; stroke:#23211c; color:#23211c; }
  .set-min.own-dark{ fill:#26231f; stroke:#0f0e0b; color:#efe9dc; }
  .set-min .body{ stroke-width:1.6; stroke-linejoin:round; }
  .set-min .mark{ fill:currentColor; stroke:none; }
  .set-min .cut{ fill:currentColor; stroke:none; }

  /* ---- modal / banner ---- */
  .modal{ position:fixed; inset:0; background:rgba(20,16,12,.6); display:flex; align-items:center; justify-content:center; z-index:20; }
  .modal[hidden]{ display:none; }
  .card{ background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:22px; width:min(86vw,330px); text-align:center; box-shadow:0 20px 50px rgba(0,0,0,.5); }
  .card h3{ font-family:"Space Grotesk",sans-serif; margin:0 0 4px; font-size:19px; }
  .card p{ margin:0 0 16px; color:var(--muted); font-size:13.5px; }
  .card .opts{ display:flex; gap:12px; justify-content:center; }
  .card .opt{ background:var(--panel2); border:1px solid var(--line); border-radius:12px; padding:10px; cursor:pointer; width:104px; }
  .card .opt:hover{ border-color:var(--accent); }
  .card .opt svg{ width:54px; height:60px; display:block; margin:0 auto 6px; }
  .card .opt span{ font-size:12px; font-family:"Space Mono",monospace; color:var(--muted); }
  .banner{ position:fixed; inset:0; background:rgba(20,16,12,.72); display:flex; align-items:center; justify-content:center; z-index:25; }
  .banner[hidden]{ display:none; }
  .banner .card h3{ font-size:24px; }
  .banner .card .big{ font-size:46px; margin:6px 0 12px; }
  .banner .card button{ font-family:"Space Mono",monospace; background:var(--accent); color:#0f1a14; border:none; border-radius:10px; padding:11px 18px; font-size:13px; font-weight:700; cursor:pointer; }

  /* ---- move history (mini-arte + notação) ---- */
  .history{ background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:8px 10px; display:flex; flex-wrap:wrap; gap:6px; max-height:96px; overflow-y:auto; align-content:flex-start; }
  .history .hist-empty{ font-size:12px; color:var(--muted); opacity:.6; font-style:italic; }
  .mv{ display:inline-flex; align-items:center; gap:5px; background:var(--panel2); border:1px solid var(--line); border-radius:8px; padding:3px 8px 3px 4px; font-family:"Space Mono",monospace; font-size:12px; color:var(--ink); }
  .mv .n{ font-size:9px; color:var(--muted); min-width:13px; text-align:right; }
  .mv .mi{ width:22px; height:22px; display:inline-flex; background:#d8bd8c; border-radius:4px; flex:none; }
  .mv .mi svg{ width:22px; height:22px; display:block; filter:none; }
</style>
</head>

<div id="app">
  <header id="topbar">
    <div class="brand">J-Chess<span class="jp">将棋</span></div>

    <div class="controls">
      <button data-act="set" id="btnSet">Set</button>
      <button data-act="board" id="btnBoard">Casas</button>
      <button data-act="undo" id="btnUndo">↩ Desfazer</button>
      <button data-act="new">＋ Novo</button>
    </div>
  </header>

  <div class="hand" id="handDark"></div>
  <div class="boardframe">
    <div class="ranks" id="ranks"></div>
    <div class="board" id="board"></div>
    <div class="files" id="files"></div>
  </div>
  <div class="hand" id="handLight"></div>
  <div class="history" id="history"></div>
</div>

<div class="modal" id="promoModal" hidden>
  <div class="card">
    <h3>Promover?</h3>
    <p>A peça entrou na zona de promoção.</p>
    <div class="opts">
      <div class="opt" id="optPromote"><span>Promover</span></div>
      <div class="opt" id="optKeep"><span>Manter</span></div>
    </div>
  </div>
</div>

<div class="banner" id="banner" hidden>
  <div class="card">
    <h3 id="bannerTitle">Xeque-mate</h3>
    <div class="big" id="bannerWho"></div>
    <button id="bannerBtn">Novo jogo</button>
  </div>
</div>
